name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, feat/streamable-http, perf/runtime-optimization]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          validate-wrappers: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Validate helper scripts
        run: bash -n scripts/update-proxy.sh

      - name: Run tests
        run: ./gradlew test

      - name: Run official MCP conformance checks
        shell: bash
        run: |
          set -uo pipefail
          server_log="$RUNNER_TEMP/mcp-conformance-server.log"
          MCP_CONFORMANCE_PORT=19877 ./gradlew runConformanceServer --no-daemon >"$server_log" 2>&1 &
          server_pid=$!
          cleanup() {
            pkill -TERM -P "$server_pid" 2>/dev/null || true
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 30); do
            code=$(curl --silent --show-error --max-time 1 --output /dev/null --write-out '%{http_code}' \
              http://127.0.0.1:19877/mcp \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json, text/event-stream' \
              --data-binary '{}' 2>/dev/null || true)
            if [[ "$code" != "000" ]]; then
              ready=true
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if [[ "$ready" != true ]]; then
            cat "$server_log"
            exit 1
          fi

          status=0
          for scenario in server-initialize ping tools-list dns-rebinding-protection server-sse-multiple-streams; do
            npx --yes @modelcontextprotocol/conformance@0.1.11 server \
              --url http://127.0.0.1:19877/mcp \
              --scenario "$scenario" \
              --verbose || status=1
          done
          if [[ "$status" -ne 0 ]]; then
            cat "$server_log"
          fi
          exit "$status"

      - name: Build extension JAR
        run: ./gradlew embedProxyJar

      - name: Verify reproducible extension JAR
        shell: bash
        run: |
          cp build/libs/burp-mcp-all.jar "$RUNNER_TEMP/burp-mcp-first.jar"
          ./gradlew embedProxyJar --rerun-tasks
          cmp "$RUNNER_TEMP/burp-mcp-first.jar" build/libs/burp-mcp-all.jar

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

      - name: Upload extension JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: burp-mcp-extension
          path: build/libs/burp-mcp-*.jar
          retention-days: 30

  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
